<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>WebMiere — OBS and yt-dlp to Premiere Pro</title>
  <meta name="description" content="Import OBS multi-track MKV and YouTube WebM/MKV directly into Adobe Premiere Pro.">
  <meta name="theme-color" content="#7c3aed">
  <link rel="canonical" href="https://kawaiiengine.github.io/WebMiere/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <meta property="og:type" content="website">
  <meta property="og:title" content="WebMiere — OBS and yt-dlp to Premiere Pro">
  <meta property="og:description" content="Native WebM/MKV import for Premiere Pro, including up to six separate Opus tracks.">
  <meta property="og:url" content="https://kawaiiengine.github.io/WebMiere/">
  <meta property="og:image" content="https://kawaiiengine.github.io/WebMiere/images/webmiere-hero.png">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <header class="header">
    <div class="brand">Web<span>Miere</span></div>
  </header>

  <main class="shell">
    <section class="copy">
      <p class="eyebrow">Premiere Pro importer</p>
      <h1>From OBS and yt-dlp to Premiere Pro.</h1>
      <p class="lead">Drop WebM/MKV directly into your timeline.</p>
      <p class="sub">VP9 / AV1 video, Opus audio, and up to six separate audio tracks.</p>

      <div class="actions">
        <span class="button primary" aria-disabled="true">Downloads temporarily unavailable</span>
        <a class="button secondary" href="checker/">Check a File</a>
        <a class="button secondary" href="https://github.com/KawaiiEngine/WebMiere">GitHub / Docs</a>
      </div>
    </section>

    <section class="visual video" id="video-container">
      <iframe
        id="youtube-demo"
        title="WebMiere — Import OBS AV1 and Opus MKV into Premiere Pro"
        loading="eager"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>

      <a class="local-preview" id="local-preview"
         href="https://youtu.be/W2LpLzsljrw"
         target="_blank" rel="noopener noreferrer">
        <img
          src="https://i.ytimg.com/vi/W2LpLzsljrw/maxresdefault.jpg"
          alt="Watch the WebMiere demo on YouTube">
        <span>Local file preview — watch on YouTube</span>
      </a>
    </section>
  </main>

  <script>
    (() => {
      const frame = document.getElementById("youtube-demo");
      const fallback = document.getElementById("local-preview");

      if (window.location.protocol === "file:") {
        frame.hidden = true;
        fallback.hidden = false;
        return;
      }

      const origin = window.location.origin;
      const pageUrl = window.location.href;
      const params = new URLSearchParams({
        rel: "0",
        playsinline: "1",
        origin,
        widget_referrer: pageUrl
      });

      frame.src = `https://www.youtube.com/embed/W2LpLzsljrw?${params.toString()}`;
      frame.hidden = false;
      fallback.hidden = true;
    })();
  </script>
</body>
</html>
